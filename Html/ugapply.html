<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undergraduate Apply</title>
    <link rel="stylesheet" href="/Css/style.css">
</head>

<body>
    <section class="apply-section">
        <h1>Undergraduate Admission Form</h1>
        <p class="subtitle">Please fill out the form carefully to apply for undergraduate programs.</p>

        <form class="apply-form">

            <!-- Personal Information -->
            <h2>Personal Information</h2>

            <label>Full Name:</label>
            <input type="text" placeholder="Enter full name" required>

            <label>Date of Birth:</label>
            <input type="date" required>

            <label>Gender:</label>
            <select required>
                <option value="">Select gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label>Email Address:</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Phone Number:</label>
            <input type="text" placeholder="+8801XXXXXXXXX" required>

            <label>Address:</label>
            <textarea rows="3" placeholder="Enter your address" required></textarea>

            <!-- Academic Information -->
            <h2>Academic Information</h2>

            <label>SSC Passing Year:</label>
            <input type="number" placeholder="e.g. 2020" required>

            <label>SSC GPA:</label>
            <input type="text" placeholder="e.g. 4.80" required>

            <label>HSC Passing Year:</label>
            <input type="number" placeholder="e.g. 2022" required>

            <label>HSC GPA:</label>
            <input type="text" placeholder="e.g. 4.50" required>

            <!-- Program Selection -->
            <h2>Choose Your Program</h2>

            <label>Select Undergraduate Program:</label>
            <select required>
                <option value="">Choose Program</option>
                <option>B.Sc. in Computer Science & Engineering (CSE)</option>
                <option>B.Sc. in Electrical & Electronic Engineering (EEE)</option>
                <option>BBA in Business Administration</option>
                <option>B.Sc. in Civil Engineering (CE)</option>
                <option>BA in English</option>
            </select>

            <!-- Document Upload -->
            <h2>Upload Documents</h2>

            <label>Upload Student Photo (JPG/PNG):</label>
            <input type="file" accept="image/*" required>

            <label>Upload SSC Marksheet (PDF):</label>
            <input type="file" accept="application/pdf" required>

            <label>Upload HSC Marksheet (PDF):</label>
            <input type="file" accept="application/pdf" required>

            <!-- Submit -->
            <button type="submit" class="submit-btn">Submit Application</button>

        </form>
    </section>

</body>

</html>
